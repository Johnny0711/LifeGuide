version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lifeguide_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-java_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: java_app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lifeguide_network

  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: lifeguide_api
    restart: always
    depends_on:
      - db
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/java_app_db
      - POSTGRES_USER=${POSTGRES_USER:-java_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - lifeguide_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifeguide_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - lifeguide_network

volumes:
  postgres_data:

networks:
  lifeguide_network:
    driver: bridge
