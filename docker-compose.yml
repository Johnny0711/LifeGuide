version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lifeguide_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-java_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: java_app_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-java_user} -d java_app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    # ports:
    #   - "5432:5432" # Auskommentiert für mehr Sicherheit, der Container ist intern trotzdem erreichbar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homeserver-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lifeguide_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://lifeguide_db:5432/java_app_db
      - POSTGRES_USER=${POSTGRES_USER:-java_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}


    # ports:
    #   - "8080:8080"
    networks:
      - homeserver-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEU: Die Vite-Variablen für den Build-Prozess durchschleifen
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: lifeguide_frontend
    restart: always
    depends_on:
      - api
    # ports:
    #   - "80:80"
    networks:
      - homeserver-net

volumes:
  postgres_data:

    # NEU: Wir verknüpfen dieses Projekt mit dem Netzwerk deines Haupt-Servers
networks:
  homeserver-net:
    external: true
    name: homeserver-net
